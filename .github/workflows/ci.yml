name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      # Pin to immutable SHA to prevent supply-chain attacks via tag mutation.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            python:
              - 'backend/**'
              - 'js8call/**'
              - 'tools/run-ci-checks.ps1'
              - '.github/workflows/ci.yml'

  frontend-smoke:
    name: Frontend Smoke
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          # Pin to a major version instead of 'latest' to avoid unexpected
          # breaking changes or a malicious package being installed.
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck smoke
        run: pnpm run typecheck

  python-smoke:
    name: Python Smoke
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Backend API smoke
        working-directory: backend/api
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_cors.py -q

      - name: Aviation poller smoke
        working-directory: backend/ingestion/aviation_poller
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_utils.py -q

      - name: Space pulse smoke
        working-directory: backend/ingestion/space_pulse
        env:
          SPACE_PULSE_CACHE_DIR: /tmp/space_pulse_cache
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_orbital.py -q

      - name: Infrastructure poller smoke
        working-directory: backend/ingestion/infra_poller
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_infra.py -q

