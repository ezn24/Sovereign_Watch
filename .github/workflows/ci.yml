name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict the default GITHUB_TOKEN to read-only access.
# Individual jobs can elevate permissions if needed (none do here).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which component trees actually changed.
  # Every test job reads these outputs and skips itself when its tree is
  # unchanged.  Changes to this workflow file always set every flag to true
  # so the full suite re-validates after pipeline edits.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend:        ${{ steps.filter.outputs.frontend }}
      backend-api:     ${{ steps.filter.outputs.backend-api }}
      aviation-poller: ${{ steps.filter.outputs.aviation-poller }}
      maritime-poller: ${{ steps.filter.outputs.maritime-poller }}
      rf-pulse:        ${{ steps.filter.outputs.rf-pulse }}
      space-pulse:     ${{ steps.filter.outputs.space-pulse }}
      infra-poller:    ${{ steps.filter.outputs.infra-poller }}
      gdelt-pulse:     ${{ steps.filter.outputs.gdelt-pulse }}
      js8call:         ${{ steps.filter.outputs.js8call }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            backend-api:
              - 'backend/api/**'
              - '.github/workflows/ci.yml'
            aviation-poller:
              - 'backend/ingestion/aviation_poller/**'
              - '.github/workflows/ci.yml'
            maritime-poller:
              - 'backend/ingestion/maritime_poller/**'
              - '.github/workflows/ci.yml'
            rf-pulse:
              - 'backend/ingestion/rf_pulse/**'
              - '.github/workflows/ci.yml'
            space-pulse:
              - 'backend/ingestion/space_pulse/**'
              - '.github/workflows/ci.yml'
            infra-poller:
              - 'backend/ingestion/infra_poller/**'
              - '.github/workflows/ci.yml'
            gdelt-pulse:
              - 'backend/ingestion/gdelt_pulse/**'
              - '.github/workflows/ci.yml'
            js8call:
              - 'js8call/**'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # Frontend — lint + unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

  # ---------------------------------------------------------------------------
  # Backend API — pytest
  # ---------------------------------------------------------------------------
  backend-api:
    name: Backend API (pytest)
    needs: changes
    if: needs.changes.outputs.backend-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + test dependencies
        working-directory: backend/api
        run: |
          python -m pip install --quiet -e . \
            pytest==9.0.2 \
            pytest-asyncio==1.3.0

      - name: Run tests
        working-directory: backend/api
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Aviation Poller — pytest
  # ---------------------------------------------------------------------------
  aviation-poller:
    name: Aviation Poller (pytest)
    needs: changes
    if: needs.changes.outputs.aviation-poller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + test dependencies
        working-directory: backend/ingestion/aviation_poller
        run: |
          python -m pip install --quiet -e . \
            pytest==9.0.2 \
            pytest-asyncio==1.3.0 \
            fakeredis==2.34.1

      - name: Run tests
        working-directory: backend/ingestion/aviation_poller
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Maritime Poller — pytest
