name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            python:
              - 'backend/**'
              - 'js8call/**'
              - 'tools/run-ci-checks.ps1'
              - '.github/workflows/ci.yml'

  frontend-smoke:
    name: Frontend Smoke
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck smoke
        run: pnpm run typecheck

  python-smoke:
    name: Python Smoke
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backend API smoke
        working-directory: backend/api
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_cors.py -q

      - name: Aviation poller smoke
        working-directory: backend/ingestion/aviation_poller
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_utils.py -q

      - name: Space pulse smoke
        working-directory: backend/ingestion/space_pulse
        env:
          SPACE_PULSE_CACHE_DIR: /tmp/space_pulse_cache
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_orbital.py -q

      - name: Infrastructure poller smoke
        working-directory: backend/ingestion/infra_poller
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          deps = list(pyproject.get('project', {}).get('dependencies', []))
          deps.extend(pyproject.get('dependency-groups', {}).get('dev', []))
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', *deps])
          PY
          python -m pytest tests/test_infra.py -q

