services:
# --- MCP Servers for AI Agents ---
  # Python LSP (Pyright) (backend analysis)
  mcp-lsp:
    build:
      context: .
      dockerfile: ./tools/mcp-language-server/Dockerfile
    image: sovereign-mcp-lsp
    container_name: sovereign-mcp-lsp
    volumes:
      - .:/workspace
    stdin_open: true
    tty: false
    # Full command for isaacphi/mcp-language-server:
    # -workspace <dir> -lsp <command> -- <args>
    command: ["-workspace", "/workspace", "-lsp", "pyright-langserver", "--", "--stdio"]
    working_dir: /workspace
    environment:
      - NODE_ENV=development

  # TypeScript/JavaScript LSP (tsserver wrapper)
  mcp-tsserver:
    image: sovereign-mcp-lsp
    container_name: sovereign-mcp-tsserver
    volumes:
      - .:/workspace
    stdin_open: true
    tty: false
    command: ["-workspace", "/workspace", "-lsp", "typescript-language-server", "--", "--stdio"]
    working_dir: /workspace
    environment:
      - NODE_ENV=development